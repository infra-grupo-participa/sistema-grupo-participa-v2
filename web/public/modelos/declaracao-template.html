<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Declaração de Faturamento — Time Holding Brasil</title>
  <link rel="icon" type="image/png" href="/images/TimeHoldingBrasil.png" />
<style>
    * { box-sizing: border-box; }
    body { font-family: 'Times New Roman', Times, serif; max-width: 820px; margin: 0 auto; padding: 40px 50px; color: #000; font-size: 15px; line-height: 1.7; background: #fdfdfd; }

    .no-print-bar {
      position: fixed; top: 0; left: 0; right: 0;
      background: #F29725; color: #fff; padding: 15px 25px;
      display: flex; flex-direction: column; gap: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px; z-index: 9999;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }
    .step-box { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 12px; }
    .step-item { display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.1); padding: 5px 10px; border-radius: 6px; }
    .step-num { background: #fff; color: #F29725; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 11px; }

    .bar-actions { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .bar-actions p { margin: 0; font-weight: 600; font-size: 14px; }
    .bar-buttons { display: flex; gap: 10px; }
    .bar-buttons button { background: #fff; color: #F29725; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 800; font-size: 13px; cursor: pointer; transition: transform 0.2s, background 0.2s; }
    .bar-buttons button:hover { transform: translateY(-1px); background: #f0f0f0; }
    .bar-buttons .btn-close { background: rgba(0,0,0,0.2); color: #fff; }

    .spacer-top { height: 140px; }

    h1 { text-align: center; font-size: 18px; font-weight: bold; text-transform: uppercase; margin-bottom: 30px; border-bottom: 2px solid #000; padding-bottom: 15px; margin-top: 20px; }
    p { text-align: justify; margin-bottom: 20px; }

    .lacuna {
      border-bottom: 2px solid #F29725;
      color: #F29725;
      min-width: 120px;
      display: inline-block;
      text-align: center;
      padding: 0 5px;
      font-weight: 600;
    }

    .assinatura-area { margin-top: 80px; }
    .assinatura-linha { border-top: 1px solid #000; width: 350px; padding-top: 10px; margin-top: 50px; }
    .assinatura-nome { font-weight: bold; font-size: 16px; text-transform: uppercase; }
    .assinatura-cargo { font-size: 14px; color: #333; font-style: italic; }

    @media print {
      .no-print-bar, .spacer-top { display: none; }
      body { margin: 0; padding: 0; background: #fff; }
      .lacuna { border-bottom: 1px solid #000; color: transparent; font-weight: normal; }
    }
  </style>
</head>
<body>
<div class="no-print-bar">
  <div class="bar-actions">
    <p>📄 Siga as instruções para gerar sua declaração oficial:</p>
    <div class="bar-buttons">
      <button onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
      <button class="btn-close" onclick="window.close()">✕ Fechar</button>
    </div>
  </div>
  <div class="step-box">
    <div class="step-item"><div class="step-num">1</div><span>Papel timbrado</span></div>
    <div class="step-item"><div class="step-num">2</div><span>Preencha as lacunas</span></div>
    <div class="step-item"><div class="step-num">3</div><span>Imprima e Assine</span></div>
    <div class="step-item"><div class="step-num">4</div><span>Escaneie (PDF)</span></div>
    <div class="step-item"><div class="step-num">5</div><span>Envie no portal</span></div>
  </div>
</div>
<div class="spacer-top"></div>

<h1>Declaração de Comprovação de Faturamento</h1>

<div id="content">Carregando conteúdo...</div>

<script>
  window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    // Parâmetros vêm da URL (controlável por terceiros): sempre escapar antes de injetar em innerHTML.
    const escapeHtml = (s) => String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const nivel = params.get('nivel') || '';
    const nome = escapeHtml(params.get('nome') || '_________________________');
    const profissao = escapeHtml(params.get('profissao') || '___________________');
    const cidade = escapeHtml(params.get('cidade') || '___________________');
    const estado = escapeHtml(params.get('estado_uf') || '___');

    const dt = new Date();
    const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
    const dataHoje = `${dt.getDate()} de ${meses[dt.getMonth()]} de ${dt.getFullYear()}`;

    const lacunaManual = (texto) => `<span class="lacuna">${texto}</span>`;
    const campoDestaque = (texto) => `<strong>${texto}</strong>`;

    const NIVEL_MAP = {
      'ouro': { label: 'Ouro', valor: 'R$ 50.000' },
      'platina': { label: 'Platina', valor: 'R$ 500.000' },
      'diamante': { label: 'Diamante', valor: 'R$ 1.000.000' },
      'diamante_vermelho': { label: 'Diamante Vermelho', valor: 'R$ 5.000.000' }
    };

    const nivelNormalizado = nivel.toLowerCase().trim().replace(/\s+/g, '_');
    const cfg = NIVEL_MAP[nivelNormalizado];
    if (!cfg) {
      document.getElementById('content').innerHTML = '<p style="color:red; text-align:center">Nível inválido para geração de declaração.</p>';
      return;
    }

    const html = `
      <p>Me chamo ${campoDestaque(nome)}, sou ${campoDestaque(profissao)}, inscrito na ${lacunaManual('[órgão de classe]')} sob o número ${lacunaManual('[número da inscrição]')}, resido/atuo na cidade de ${campoDestaque(cidade)}/${campoDestaque(estado)} e declaro para todos os fins que me tornei profissional Nível ${campoDestaque(cfg.label)} por ter faturado mais de ${campoDestaque(cfg.valor)} nos últimos doze meses, trabalhando com Holding Familiar e implementando as técnicas específicas e de captação de clientes que me foram ensinadas pelo Professor Marcio Carvalho de Sá.</p>

      <p style="margin-top:40px">${campoDestaque(cidade)}, ${campoDestaque(dataHoje)}.</p>

      <div class="assinatura-area">
        <div class="assinatura-linha">
          <div class="assinatura-nome">${nome}</div>
          <div class="assinatura-cargo">${profissao}</div>
        </div>
      </div>
    `;

    document.title = `Declaração Nível ${cfg.label} - ${params.get('nome') || ''}`;
    document.getElementById('content').innerHTML = html;
  };
</script>
</body>
</html>
